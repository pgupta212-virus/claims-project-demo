function useClock(){const[n,sN]=useState(new Date());useEffect(()=>{const id=setInterval(()=>sN(new Date()),1000);return()=>clearInterval(id);},[]);return n;}

const PHead=({title,sub,right,accent=T.teal})=>(<div style={{padding:"13px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:`linear-gradient(90deg,${accent}0a 0%,transparent 60%)`}}><div><div style={{fontSize:12,fontWeight:800,color:T.text}}>{title}</div>{sub&&<div style={{fontSize:10,color:T.mid,marginTop:2}}>{sub}</div>}</div>{right}</div>);

const NBtn=({label,onClick})=>(<button onClick={onClick} style={{background:"none",border:"none",color:T.teal,fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>{label} →</button>);

const Btn=({label,onClick,variant="primary",small=false})=>{
  const s={primary:{bg:T.teal,border:T.teal,color:T.bg},secondary:{bg:"transparent",border:T.border,color:T.mid},danger:{bg:"transparent",border:T.rose,color:T.rose}}[variant];
  return(<button onClick={onClick} style={{background:s.bg,border:`1px solid ${s.border}`,color:s.color,borderRadius:7,padding:small?"6px 14px":"8px 18px",fontSize:small?12:13,fontWeight:700,cursor:"pointer",transition:"opacity 0.15s"}} onMouseEnter={e=>e.currentTarget.style.opacity="0.75"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>{label}</button>);
};

const Field=({label,value,mono=false,highlight})=>(<div style={{background:T.s2,borderRadius:8,padding:"12px 14px"}}><div style={{fontSize:10,fontWeight:700,color:T.dim,letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:5}}>{label}</div><div style={{fontSize:13,fontWeight:600,color:highlight||T.text,fontFamily:mono?T.mono:"inherit"}}>{value||<span style={{color:T.dim}}>—</span>}</div></div>);

const FInput=({label,value,onChange,placeholder,type="text",mono=false})=>(<div><div style={{fontSize:11,fontWeight:600,color:T.mid,marginBottom:5}}>{label}</div><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"9px 12px",fontSize:13,color:T.text,fontFamily:mono?T.mono:"inherit",outline:"none",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border}/></div>);

const FSelect=({label,value,onChange,options})=>(<div><div style={{fontSize:11,fontWeight:600,color:T.mid,marginBottom:5}}>{label}</div><select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"9px 12px",fontSize:13,color:T.text,outline:"none",cursor:"pointer"}}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>);

const FArea=({label,value,onChange,placeholder,rows=3})=>(<div><div style={{fontSize:11,fontWeight:600,color:T.mid,marginBottom:5}}>{label}</div><textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{width:"100%",background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"9px 12px",fontSize:13,color:T.text,outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit"}} onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border}/></div>);

const KpiCard=({label,value,context,color,icon,flag,flagColor,onClick})=>(<div onClick={onClick} style={{background:T.s1,border:`1px solid ${flag?`${flagColor}44`:T.border}`,borderRadius:12,padding:"20px 22px",position:"relative",cursor:onClick?"pointer":"default",transition:"transform 0.15s, box-shadow 0.15s",boxShadow:flag?`0 0 0 1px ${flagColor}22`:"none"}} onMouseEnter={e=>{if(onClick){e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow=`0 6px 24px ${color}18`;}}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow=flag?`0 0 0 1px ${flagColor}22`:"none";}}><div style={{position:"absolute",top:0,left:0,right:0,height:2,borderRadius:"12px 12px 0 0",background:`linear-gradient(90deg,${color},transparent 70%)`}}/>{flag&&<div style={{position:"absolute",top:14,right:14,width:7,height:7,borderRadius:"50%",background:flagColor,boxShadow:`0 0 6px ${flagColor}`}}/>}<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}><span style={{fontSize:11,color:T.mid,fontWeight:500}}>{label}</span><span style={{fontSize:20,opacity:0.75}}>{icon}</span></div><div style={{fontSize:34,fontWeight:800,color,lineHeight:1,marginBottom:8,fontFamily:"Georgia,serif",letterSpacing:"-0.5px"}}>{value}</div><div style={{fontSize:12,color:flag?flagColor:T.mid,fontWeight:flag?600:400,lineHeight:1.4}}>{context}</div></div>);

const StudyRow=({s,onOpen})=>{
  const pct=Math.min(100,(s.enrolled/s.target)*100);
  const c=sColor(s.status);
  const belowMin=s.status==="Screening"&&s.enrolled<s.target;
  return(<div onClick={onOpen} style={{padding:"13px 18px",borderBottom:`1px solid ${T.border}`,cursor:"pointer",transition:"background 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background=T.s2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
    <div style={{display:"flex",gap:12,alignItems:"center"}}>
      <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:c,boxShadow:s.status==="Active"?`0 0 7px ${c}`:"none"}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
          <span style={{fontFamily:T.mono,fontSize:10,color:T.teal}}>{s.id}</span>
          <span style={{fontSize:13,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.sponsor}</span>
          {s.aes>0&&<Pill label={`${s.aes} AE`} color={T.amber}/>}
          {belowMin&&<Pill label="Below min" color={T.rose}/>}
        </div>
        <div style={{fontSize:11,color:T.mid,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:7}}>{s.product}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{flex:1,height:3,background:T.s4,borderRadius:4,overflow:"hidden"}}><div style={{height:3,borderRadius:4,width:`${pct}%`,background:s.status==="Completed"?T.teal:belowMin?T.rose:T.blue,transition:"width 0.8s"}}/></div>
          <span style={{fontSize:10,color:belowMin?T.rose:T.mid,fontWeight:belowMin?700:400,flexShrink:0}}>{s.enrolled}/{s.target}</span>
        </div>
      </div>
      <div style={{textAlign:"right",flexShrink:0}}>
        <Pill label={s.status} color={c}/>
        <div style={{fontSize:10,color:T.mid,marginTop:4}}>{s.phase}</div>
        {s.draize!==null&&<div style={{fontSize:9,color:T.teal,fontFamily:T.mono,marginTop:2}}>Draize {s.draize.toFixed(2)}</div>}
      </div>
    </div>
    <div style={{display:"flex",gap:6,marginTop:8,paddingLeft:19}}>
      {[["V1",s.v1],["V2",s.v2],["V3",s.v3],["V4",s.v4]].map(([lbl,done])=>(
        <div key={lbl} style={{display:"flex",alignItems:"center",gap:3}}>
          <div style={{width:13,height:13,borderRadius:"50%",fontSize:7,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",background:done?`${T.teal}28`:T.s4,border:`1.5px solid ${done?T.teal:T.dim}`,color:done?T.teal:T.dim}}>{done?"✓":"·"}</div>
          <span style={{fontSize:9,color:done?T.teal:T.dim}}>{lbl}</span>
        </div>
      ))}
    </div>
  </div>);
};

const AlertRow=({a,onNav,compact=false})=>{
  const c={critical:T.rose,warning:T.amber,info:T.teal}[a.sev];
  return(<div style={{padding:compact?"10px 16px":"12px 18px",borderBottom:`1px solid ${T.border}`,borderLeft:`3px solid ${c}`,background:`${c}06`,transition:"background 0.15s",cursor:"pointer"}} onClick={()=>onNav(a.mod)} onMouseEnter={e=>e.currentTarget.style.background=`${c}12`} onMouseLeave={e=>e.currentTarget.style.background=`${c}06`}>
    <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
      <span style={{fontSize:compact?13:15,flexShrink:0,marginTop:1}}>{a.icon}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3,flexWrap:"wrap"}}>
          <span style={{fontSize:10,fontWeight:700,color:c}}>{a.title}</span>
          {a.tag&&<span style={{fontSize:8,fontWeight:700,color:c,background:`${c}18`,border:`1px solid ${c}33`,borderRadius:3,padding:"1px 5px",letterSpacing:"0.4px",textTransform:"uppercase",flexShrink:0}}>{a.tag}</span>}
        </div>
        {!compact&&<p style={{fontSize:11,color:T.mid,margin:"0 0 5px",lineHeight:1.5}}>{a.body}</p>}
        <span style={{fontSize:10,color:c,fontWeight:700}}>{a.act} →</span>
      </div>
    </div>
  </div>);
};

const StudyForm=({initial,onSave,onCancel,isEdit=false})=>{
  const[f,setF]=useState({...initial});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 4px"}}>{isEdit?"Edit Study":"New Study"}</h2>
        <p style={{fontSize:12,color:T.mid,margin:0}}>{isEdit?`Editing ${initial.fullId||initial.id}`:"Fill in all fields before activating the study"}</p>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn label="Cancel" onClick={onCancel} variant="secondary"/>
        <Btn label={isEdit?"Save Changes":"Create Study"} onClick={()=>onSave(f)}/>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Panel>
        <PHead title="Study Identity" accent={T.teal}/>
        <div style={{padding:"18px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <FInput label="Study ID" value={f.fullId} onChange={v=>set("fullId",v)} placeholder="CL/000/0126/STU" mono/>
          <FSelect label="Status" value={f.status} onChange={v=>set("status",v)} options={["Setup","Screening","Active","Completed","Closed"]}/>
          <FInput label="Sponsor" value={f.sponsor} onChange={v=>set("sponsor",v)} placeholder="Sponsor name"/>
          <FSelect label="Category" value={f.category} onChange={v=>set("category",v)} options={["Sunscreen","Face Wash","Moisturiser","Hand Wash","Baby Product","Other"]}/>
          <div style={{gridColumn:"1/-1"}}><FInput label="Product Name" value={f.product} onChange={v=>set("product",v)} placeholder="Full product name as received from sponsor"/></div>
        </div>
      </Panel>
      <Panel>
        <PHead title="Protocol & Logistics" accent={T.blue}/>
        <div style={{padding:"18px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <FInput label="Start Date" value={f.start} onChange={v=>set("start",v)} placeholder="DD/MM/YYYY"/>
          <FInput label="End Date" value={f.end} onChange={v=>set("end",v)} placeholder="DD/MM/YYYY"/>
          <FInput label="Principal Investigator" value={f.pi} onChange={v=>set("pi",v)}/>
          <FInput label="Study Coordinator" value={f.coordinator} onChange={v=>set("coordinator",v)}/>
          <FInput label="Protocol Reference" value={f.protocol} onChange={v=>set("protocol",v)} placeholder="IS 4011:2018" mono/>
          <FInput label="Target Enrollment (N)" value={String(f.target)} onChange={v=>set("target",parseInt(v)||0)} type="number"/>
          <div style={{gridColumn:"1/-1"}}><FInput label="Site" value={f.site} onChange={v=>set("site",v)}/></div>
          <div style={{gridColumn:"1/-1"}}><FArea label="Study Objective" value={f.objective} onChange={v=>set("objective",v)} placeholder="Brief description of the study's aim and test substance..." rows={3}/></div>
        </div>
      </Panel>
    </div>
  </div>);
};

const BLANK_PARTICIPANT = { age:"", gender:"F", fitzpatrick:"IV", consent:"Pending", screening:"—", notes:"" };

const ZONES = ["Upper Back - Left","Upper Back - Right","Upper Back - Centre","Forearm - Left","Forearm - Right","Upper Arm - Left","Upper Arm - Right"];

const defaultVisitData=(study)=>({
  v1:{date:"",time:"09:00",zone:"Upper Back - Left",batch:"",appliedBy:study.coordinator,notes:""},
  v2:{date:"",time:"09:15",removedBy:study.coordinator,earlyRemoval:false,earlyReason:"",condition:"Normal"},
  v3:{date:"",time:"09:00",scoredBy:study.pi,erythema:0,dryness:0,oedema:0,notes:""},
  v4:{date:"",notes:"",resolvedBy:study.pi,resolution:"Resolved"},
});

const ScoreBtn=({label,value,onChange,max})=>{
  const color=value===0?T.teal:value<=1?T.amber:T.rose;
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
    <div style={{fontSize:9,fontWeight:700,color:T.mid,textTransform:"uppercase",letterSpacing:"0.5px",whiteSpace:"nowrap"}}>{label}</div>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <button onClick={()=>onChange(Math.max(0,value-1))} style={{width:24,height:24,borderRadius:5,border:`1px solid ${T.border}`,background:T.s3,color:T.mid,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,fontWeight:700}}>−</button>
      <div style={{width:36,height:36,borderRadius:8,background:`${color}22`,border:`1.5px solid ${color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color,fontFamily:T.mono,transition:"all 0.15s"}}>{value}</div>
      <button onClick={()=>onChange(Math.min(max,value+1))} style={{width:24,height:24,borderRadius:5,border:`1px solid ${T.border}`,background:T.s3,color:T.mid,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,fontWeight:700}}>+</button>
    </div>
    <div style={{fontSize:9,color:T.dim}}>/ {max}</div>
  </div>);
};

const VisitCard=({title,time,accent,done,saved,onSave,locked,lockedMsg,optional,children})=>(
  <div style={{background:T.s1,border:`1px solid ${locked?T.border:done?`${accent}44`:T.border}`,borderRadius:10,overflow:"hidden"}}>
    <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:`linear-gradient(90deg,${accent}0d,transparent 60%)`}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div style={{width:9,height:9,borderRadius:"50%",background:done?accent:T.s4,border:`1.5px solid ${done?accent:T.dim}`,boxShadow:done?`0 0 7px ${accent}`:"none",flexShrink:0}}/>
        <span style={{fontSize:13,fontWeight:700,color:done?accent:T.text}}>{title}</span>
        <span style={{fontSize:10,color:T.dim,fontFamily:T.mono}}>{time}</span>
        {optional&&<Pill label="Only if AE" color={T.amber}/>}
        {done&&<Pill label="Saved" color={accent}/>}
      </div>
      {locked
        ?<span style={{fontSize:11,color:T.dim}}>🔒 {lockedMsg}</span>
        :<button onClick={onSave} style={{background:saved?T.tealG:`${accent}18`,border:`1px solid ${saved?T.teal:`${accent}44`}`,color:saved?T.teal:accent,borderRadius:6,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{saved?"✓ Saved":"Save Visit"}</button>
      }
    </div>
    <div style={{padding:"16px"}}>
      {locked?<div style={{fontSize:12,color:T.dim,textAlign:"center",padding:"8px 0"}}>Complete previous visit to unlock this section</div>:children}
    </div>
  </div>
);

const ParticipantVisitPanel=({p,study,onUpdate,showStudyCol=false})=>{
  const[open,setOpen]=useState(false);
  const[vd,setVd]=useState(()=>p.visitData||defaultVisitData(study));
  const[saved,setSaved]=useState(null);
  const setV=(visit,key,val)=>setVd(prev=>({...prev,[visit]:{...prev[visit],[key]:val}}));
  const saveVisit=(visitKey)=>{
    const v3total=vd.v3.erythema+vd.v3.dryness+vd.v3.oedema;
    const updated={...p,visitData:vd,[visitKey]:true,...(visitKey==="v3"?{draizeScore:v3total,status:"Completed"}:{})};
    onUpdate(updated);
    setSaved(visitKey);
    setTimeout(()=>setSaved(null),2200);
  };
  const v3total=vd.v3.erythema+vd.v3.dryness+vd.v3.oedema;
  const classify=t=>t<=2?["Non-Irritant",T.teal]:t<=4?["Mild Irritant",T.amber]:["Irritant",T.rose];
  const[classLabel,classColor]=classify(v3total);
  const score=p.draizeScore!==undefined?p.draizeScore:null;

  return(<div style={{borderBottom:`1px solid ${T.border}`}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",cursor:"pointer",transition:"background 0.15s",background:open?T.s2:"transparent"}} onMouseEnter={e=>{if(!open)e.currentTarget.style.background=T.s2;}} onMouseLeave={e=>{if(!open)e.currentTarget.style.background="transparent";}}>
      <span style={{fontSize:10,color:open?T.teal:T.dim,transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",display:"inline-block",flexShrink:0}}>▶</span>
      <span style={{fontFamily:T.mono,fontSize:12,fontWeight:700,color:T.teal,minWidth:58,flexShrink:0}}>{p.id}</span>
      {showStudyCol&&<span style={{minWidth:110,flexShrink:0}}><span style={{fontFamily:T.mono,fontSize:10,color:T.blue}}>{p.study}</span><br/><span style={{fontSize:10,color:T.dim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:100,display:"inline-block"}}>{study.sponsor||""}</span></span>}
      {!showStudyCol&&<span style={{fontSize:12,color:T.mid,minWidth:36,flexShrink:0}}>{p.age}{p.gender}</span>}
      {!showStudyCol&&<span style={{fontSize:11,color:T.dim,fontFamily:T.mono,flexShrink:0}}>FP-{p.fitzpatrick}</span>}
      <Pill label={p.consent} color={p.consent==="Signed"?T.teal:p.consent==="Pending"?T.amber:T.rose}/>
      <Pill label={p.screening} color={p.screening==="Passed"?T.teal:p.screening==="Failed"?T.rose:T.mid}/>
      <Pill label={p.status} color={pColor(p.status)}/>
      {score!==null&&<Pill label={`Draize ${score.toFixed(1)} — ${classify(score)[0]}`} color={classify(score)[1]}/>}
      <div style={{marginLeft:"auto",display:"flex",gap:4,flexShrink:0}}>
        {[["V1",p.v1,"Application"],["V2",p.v2,"Removal"],["V3",p.v3,"Scoring"],["V4",p.v4,"Follow-up"]].map(([lbl,done,tip])=>(
          <div key={lbl} title={`${lbl}: ${tip}`} style={{width:22,height:22,borderRadius:"50%",fontSize:7,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",background:done?`${T.teal}28`:T.s4,border:`1.5px solid ${done?T.teal:T.dim}`,color:done?T.teal:T.dim}}>{done?"✓":"·"}</div>
        ))}
      </div>
    </div>
    {open&&(
      <div style={{background:T.s0,borderTop:`1px solid ${T.border}`,padding:"16px 18px",display:"flex",flexDirection:"column",gap:12}}>
        <VisitCard title="V1 — Patch Application" time="0 Hours" accent={T.teal} done={p.v1} saved={saved==="v1"} onSave={()=>saveVisit("v1")} locked={p.screening!=="Passed"} lockedMsg="Participant not screened">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
            <FSelect label="Application Zone" value={vd.v1.zone} onChange={v=>setV("v1","zone",v)} options={ZONES}/>
            <FInput label="Batch Number" value={vd.v1.batch} onChange={v=>setV("v1","batch",v)} placeholder="e.g. PAL/AASG-E/26/001" mono/>
            <FInput label="Applied By" value={vd.v1.appliedBy} onChange={v=>setV("v1","appliedBy",v)}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <FInput label="Date" value={vd.v1.date} onChange={v=>setV("v1","date",v)} placeholder="DD/MM/YYYY"/>
              <FInput label="Time" value={vd.v1.time} onChange={v=>setV("v1","time",v)} placeholder="HH:MM"/>
            </div>
            <div style={{gridColumn:"1/-1"}}><FArea label="Notes at Application" value={vd.v1.notes} onChange={v=>setV("v1","notes",v)} placeholder="Skin condition before application, any observations..." rows={2}/></div>
          </div>
        </VisitCard>
        <VisitCard title="V2 — Patch Removal" time="24 Hours" accent={T.blue} done={p.v2} saved={saved==="v2"} onSave={()=>saveVisit("v2")} locked={!p.v1} lockedMsg="Complete V1 first">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
            <FInput label="Removed By" value={vd.v2.removedBy} onChange={v=>setV("v2","removedBy",v)}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <FInput label="Date" value={vd.v2.date} onChange={v=>setV("v2","date",v)} placeholder="DD/MM/YYYY"/>
              <FInput label="Time" value={vd.v2.time} onChange={v=>setV("v2","time",v)} placeholder="HH:MM"/>
            </div>
            <FSelect label="Site Condition" value={vd.v2.condition} onChange={v=>setV("v2","condition",v)} options={["Normal","Abnormal — Mild","Abnormal — Moderate","Abnormal — Severe"]}/>
            <FSelect label="Early Removal?" value={vd.v2.earlyRemoval?"Yes":"No"} onChange={v=>setV("v2","earlyRemoval",v==="Yes")} options={["No","Yes"]}/>
            {vd.v2.earlyRemoval&&<div style={{gridColumn:"1/-1"}}><FInput label="Early Removal Reason" value={vd.v2.earlyReason} onChange={v=>setV("v2","earlyReason",v)} placeholder="Reason for removing patch before 24h..."/></div>}
          </div>
        </VisitCard>
        <VisitCard title="V3 — Skin Scoring (Draize)" time="48 Hours" accent={T.indig} done={p.v3} saved={saved==="v3"} onSave={()=>saveVisit("v3")} locked={!p.v2} lockedMsg="Complete V2 first">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
              <FInput label="Scored By (PI)" value={vd.v3.scoredBy} onChange={v=>setV("v3","scoredBy",v)}/>
              <FInput label="Date" value={vd.v3.date} onChange={v=>setV("v3","date",v)} placeholder="DD/MM/YYYY"/>
              <FInput label="Time" value={vd.v3.time} onChange={v=>setV("v3","time",v)} placeholder="HH:MM"/>
            </div>
            <div style={{background:T.s2,borderRadius:10,padding:"18px 22px",display:"flex",alignItems:"center",gap:28,flexWrap:"wrap"}}>
              <ScoreBtn label="Erythema" value={vd.v3.erythema} onChange={v=>setV("v3","erythema",v)} max={4}/>
              <div style={{width:1,height:48,background:T.border,flexShrink:0}}/>
              <ScoreBtn label="Dryness / Scaling" value={vd.v3.dryness} onChange={v=>setV("v3","dryness",v)} max={2}/>
              <div style={{width:1,height:48,background:T.border,flexShrink:0}}/>
              <ScoreBtn label="Oedema" value={vd.v3.oedema} onChange={v=>setV("v3","oedema",v)} max={4}/>
              <div style={{marginLeft:"auto",display:"flex",gap:16,alignItems:"center"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:700,color:T.mid,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Total Score</div>
                  <div style={{width:52,height:52,borderRadius:10,background:`${classColor}22`,border:`2px solid ${classColor}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:800,color:classColor,fontFamily:T.mono}}>{v3total}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:700,color:T.mid,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Classification</div>
                  <Pill label={classLabel} color={classColor}/>
                  <div style={{fontSize:9,color:T.dim,marginTop:6}}>IS 4011:2018</div>
                </div>
              </div>
            </div>
            <FArea label="PI Scoring Notes" value={vd.v3.notes} onChange={v=>setV("v3","notes",v)} placeholder="Any abnormalities, comments by PI..." rows={2}/>
          </div>
        </VisitCard>
        <VisitCard title="V4 — Follow-up" time="1 Week" accent={T.amber} done={p.v4} saved={saved==="v4"} onSave={()=>saveVisit("v4")} locked={!p.v3} lockedMsg="Complete V3 first" optional>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            <FInput label="Follow-up Date" value={vd.v4.date} onChange={v=>setV("v4","date",v)} placeholder="DD/MM/YYYY"/>
            <FInput label="Resolved By" value={vd.v4.resolvedBy} onChange={v=>setV("v4","resolvedBy",v)}/>
            <FSelect label="Resolution Status" value={vd.v4.resolution} onChange={v=>setV("v4","resolution",v)} options={["Resolved","Ongoing","Referred to Dermatologist"]}/>
            <div style={{gridColumn:"1/-1"}}><FArea label="Follow-up Notes" value={vd.v4.notes} onChange={v=>setV("v4","notes",v)} placeholder="Resolution details, final status..." rows={2}/></div>
          </div>
        </VisitCard>
      </div>
    )}
  </div>);
};

const StudyDetail=({study, parts, onAddParticipant, onUpdateParticipant, onBack, onEdit})=>{
  const[tab,setTab]=useState("overview");
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({...BLANK_PARTICIPANT});
  const[errors,setErrors]=useState({});
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));

  const validate=()=>{
    const e={};
    if(!form.age||isNaN(form.age)||Number(form.age)<18||Number(form.age)>65) e.age="Age must be 18–65";
    return e;
  };

  const handleAdd=()=>{
    const e=validate();
    if(Object.keys(e).length){setErrors(e);return;}
    const allIds=parts.map(p=>parseInt(p.id.replace("V-",""))||0);
    const nextNum=String(Math.max(0,...allIds)+1).padStart(3,"0");
    const screening=form.consent==="Signed"?"Passed":"—";
    const newP={
      id:`V-${nextNum}`, study:study.id,
      age:Number(form.age), gender:form.gender,
      fitzpatrick:form.fitzpatrick,
      consent:form.consent, screening,
      status:form.consent==="Signed"&&screening==="Passed"?"Active":"Pending",
      v1:false,v2:false,v3:false,v4:false
    };
    onAddParticipant(newP);
    setForm({...BLANK_PARTICIPANT});
    setErrors({});
    setShowForm(false);
  };

  const statusCol=sColor(study.status);
  const belowMin=study.status==="Screening"&&study.enrolled<study.target;
  const pct=Math.min(100,(parts.length/study.target)*100);

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:T.teal,fontSize:13,fontWeight:700,cursor:"pointer",padding:0}}>← Back to Studies</button>
      <Btn label="Edit Study" onClick={onEdit} variant="secondary" small/>
    </div>

    {/* study header card */}
    <div style={{background:T.s1,border:`1px solid ${statusCol}44`,borderRadius:12,padding:"20px 24px",marginBottom:16,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${statusCol},transparent 60%)`}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
            <span style={{fontFamily:T.mono,fontSize:11,color:T.teal}}>{study.fullId}</span>
            <Pill label={study.status} color={statusCol}/>
            <Pill label={study.phase} color={T.mid}/>
            {study.aes>0&&<Pill label={`${study.aes} AE`} color={T.amber}/>}
            {belowMin&&<Pill label="Below minimum" color={T.rose}/>}
          </div>
          <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 4px"}}>{study.sponsor}</h2>
          <p style={{fontSize:13,color:T.mid,margin:"0 0 10px"}}>{study.product}</p>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <div style={{fontSize:12,color:T.mid}}>📅 <span style={{color:T.text,fontWeight:600}}>{study.start} – {study.end}</span></div>
            <div style={{fontSize:12,color:T.mid}}>👨‍⚕️ <span style={{color:T.text,fontWeight:600}}>{study.pi}</span></div>
            <div style={{fontSize:12,color:T.mid}}>👤 <span style={{color:T.text,fontWeight:600}}>{study.coordinator}</span></div>
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:11,color:T.mid,marginBottom:4}}>Enrollment</div>
          <div style={{fontSize:32,fontWeight:800,color:belowMin?T.rose:statusCol,fontFamily:"Georgia,serif",lineHeight:1}}>{parts.length}</div>
          <div style={{fontSize:11,color:T.mid,marginBottom:8}}>of {study.target} target</div>
          <div style={{width:110,height:5,background:T.s4,borderRadius:4,overflow:"hidden",marginLeft:"auto"}}>
            <div style={{height:5,borderRadius:4,width:`${pct}%`,background:belowMin?T.rose:statusCol,transition:"width 0.8s"}}/>
          </div>
          {study.completers!==null&&<div style={{fontSize:11,color:T.teal,marginTop:6,fontWeight:600}}>{study.completers} completers</div>}
        </div>
      </div>
    </div>

    {/* tabs */}
    <div style={{display:"flex",gap:4,marginBottom:16}}>
      {[["overview","Overview"],["participants",`Participants (${parts.length})`]].map(([id,label])=>(
        <button key={id} onClick={()=>{setTab(id);setShowForm(false);}} style={{padding:"8px 18px",borderRadius:7,border:`1px solid ${tab===id?T.teal:T.border}`,background:tab===id?T.tealG:"transparent",color:tab===id?T.teal:T.mid,fontSize:13,fontWeight:tab===id?700:400,cursor:"pointer",transition:"all 0.15s"}}>
          {label}
        </button>
      ))}
    </div>

    {tab==="overview"&&(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Panel>
          <PHead title="Protocol Details" accent={T.teal}/>
          <div style={{padding:"18px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
            <Field label="Protocol Reference" value={study.protocol} mono highlight={T.teal}/>
            <Field label="Study Site" value={study.site}/>
            <Field label="Study Dates" value={`${study.start} – ${study.end}`}/>
            <Field label="Principal Investigator" value={study.pi}/>
            <Field label="Study Coordinator" value={study.coordinator}/>
            <Field label="Product Category" value={study.category}/>
          </div>
        </Panel>
        <Panel>
          <PHead title="Study Objective" accent={T.blue}/>
          <div style={{padding:"18px"}}>
            <p style={{fontSize:13,color:T.text,lineHeight:1.7,margin:0}}>{study.objective}</p>
          </div>
        </Panel>
        <Panel>
          <PHead title="Visit Schedule" accent={T.indig}/>
          <div style={{padding:"18px",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>

                  <span style={{fontSize:10,fontWeight:600,color:done?T.teal:T.dim}}>{done?"Completed":"Pending"}</span>
                </div>
              </div>
            ))}
          </div>
        </Panel>
        {study.draize!==null&&(
          <Panel>
            <PHead title="Draize Result" accent={T.teal}/>
            <div style={{padding:"18px",display:"flex",gap:16,alignItems:"center"}}>

                <div style={{fontSize:36,fontWeight:800,color:T.teal,fontFamily:"Georgia,serif"}}>{study.draize.toFixed(2)}</div>
                <div style={{fontSize:11,color:T.teal,fontWeight:700,marginTop:4}}>Mean Draize Score</div>
              </div>
              <div>
                <Pill label="Non-Irritant" color={T.teal}/>
                <p style={{fontSize:13,color:T.mid,margin:"8px 0 0",lineHeight:1.6}}>Score ≤ 2.0 classifies this product as <strong style={{color:T.teal}}>non-irritant</strong> under IS 4011:2018. All {study.completers} completers scored within acceptable range.</p>
              </div>
            </div>
          </Panel>
        )}
      </div>
    )}

    {tab==="participants"&&(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Add participant form */}
        {showForm?(
          <Panel>
            <PHead title="Add Participant" sub="Fields marked * are required" accent={T.teal}/>
            <div style={{padding:"18px",display:"flex",flexDirection:"column",gap:16}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
                <div>
                  <FInput label="Age *" value={form.age} onChange={v=>setF("age",v)} placeholder="e.g. 28" type="number"/>
                  {errors.age&&<div style={{fontSize:11,color:T.rose,marginTop:4}}>{errors.age}</div>}
                </div>
                <FSelect label="Gender" value={form.gender} onChange={v=>setF("gender",v)} options={["F","M"]}/>
                <FSelect label="Fitzpatrick Type" value={form.fitzpatrick} onChange={v=>setF("fitzpatrick",v)} options={["I","II","III","IV","V","VI"]}/>
                <FSelect label="Consent Status" value={form.consent} onChange={v=>setF("consent",v)} options={["Signed","Pending"]}/>
              </div>
              <div style={{padding:"12px 14px",background:T.s2,borderRadius:8,fontSize:12,color:T.mid,lineHeight:1.6}}>
                ℹ Screening status will be set to <strong style={{color:T.text}}>Passed</strong> automatically when consent is Signed. Participant status will be set to <strong style={{color:T.text}}>Active</strong>.
              </div>
              <div style={{display:"flex",gap:10}}>
                <Btn label="Add Participant" onClick={handleAdd}/>
                <Btn label="Cancel" onClick={()=>{setShowForm(false);setErrors({});setForm({...BLANK_PARTICIPANT});}} variant="secondary"/>
              </div>
            </div>
          </Panel>
        ):(
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <Btn label="+ Add Participant" onClick={()=>setShowForm(true)}/>
          </div>
        )}

        <Panel>
          <PHead
            title={`Participants — ${study.id}`}
            sub={`${parts.filter(p=>p.status==="Completed").length} completed · ${parts.filter(p=>p.status==="Active").length} active · ${parts.filter(p=>["Withdrawn","Excluded"].includes(p.status)).length} dropped`}
            accent={T.blue}
            right={<div style={{display:"flex",gap:8}}><Pill label={`${parts.filter(p=>p.consent==="Signed").length}/${parts.length} consented`} color={T.teal}/><Pill label={`${parts.filter(p=>p.screening==="Passed").length} screened`} color={T.blue}/></div>}
          />
          {parts.length===0
            ?<div style={{padding:"32px",textAlign:"center",color:T.mid,fontSize:13}}>No participants enrolled yet. Click <strong style={{color:T.teal}}>+ Add Participant</strong> above to begin.</div>
            :<div>
              <div style={{padding:"8px 16px",background:T.s2,borderBottom:`1px solid ${T.border}`,display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:9,fontWeight:700,color:T.dim,letterSpacing:"0.5px",textTransform:"uppercase",minWidth:58}}>ID</span>
                <span style={{fontSize:9,fontWeight:700,color:T.dim,letterSpacing:"0.5px",textTransform:"uppercase",minWidth:36}}>Age</span>
                <span style={{fontSize:9,fontWeight:700,color:T.dim,letterSpacing:"0.5px",textTransform:"uppercase"}}>Consent · Screening · Status · Draize</span>
                <span style={{marginLeft:"auto",fontSize:9,fontWeight:700,color:T.dim,letterSpacing:"0.5px",textTransform:"uppercase"}}>Visits</span>
              </div>
              {parts.map(p=><ParticipantVisitPanel key={p.id} p={p} study={study} onUpdate={onUpdateParticipant}/>)}
            </div>
          }
          <div style={{padding:"16px 18px",borderTop:`1px solid ${T.border}`,background:T.s0}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:T.teal,marginBottom:8}}>✓ Inclusion Criteria</div>
                {["Age 18–65, healthy skin","Fitzpatrick type III–V","Written consent provided","No active skin conditions"].map(item=>(<div key={item} style={{fontSize:12,color:T.mid,padding:"4px 0",borderBottom:`1px solid ${T.border}`}}>· {item}</div>))}
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:T.rose,marginBottom:8}}>✗ Exclusion Criteria</div>
                {["Pregnancy or lactation","Active dermatological infection","Known hypersensitivity","Use of interfering medications"].map(item=>(<div key={item} style={{fontSize:12,color:T.mid,padding:"4px 0",borderBottom:`1px solid ${T.border}`}}>· {item}</div>))}
              </div>
            </div>
          </div>
        </Panel>
      </div>
    )}
  </div>);
};

const StudiesPage=({studies,setStudies,participants,onAddParticipant,onUpdateParticipant})=>{
  const[nav,setNav]=useState({view:"list",id:null});
  const selected=studies.find(s=>s.id===nav.id)||null;
  const selectedParts=selected?participants.filter(p=>p.study===selected.id):[];

  const openDetail=id=>setNav({view:"detail",id});
  const handleSave=f=>{
    if(nav.view==="new"){
      const nid=`CL-N${studies.length+1}`;
      setStudies(p=>[...p,{...f,id:nid,draize:null,v1:false,v2:false,v3:false,v4:false,aes:0}]);
      setNav({view:"list",id:null});
    } else {
      setStudies(p=>p.map(s=>s.id===nav.id?{...s,...f}:s));
      setNav(n=>({...n,view:"detail"}));
    }
  };
  if(nav.view==="new")                return <StudyForm initial={{...BLANK}} onSave={handleSave} onCancel={()=>setNav({view:"list",id:null})} isEdit={false}/>;
  if(nav.view==="edit"   && selected) return <StudyForm initial={selected} onSave={handleSave} onCancel={()=>setNav(n=>({...n,view:"detail"}))} isEdit={true}/>;
  if(nav.view==="detail" && selected) return <StudyDetail study={selected} parts={selectedParts} onAddParticipant={onAddParticipant} onUpdateParticipant={onUpdateParticipant} onBack={()=>setNav({view:"list",id:null})} onEdit={()=>setNav(n=>({...n,view:"edit"}))}/>;
  if(nav.view!=="list")               return null;

  const completed=studies.filter(s=>s.status==="Completed").length;
  const active=studies.filter(s=>s.status==="Active").length;
  const screening=studies.filter(s=>s.status==="Screening").length;

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 4px"}}>Studies</h2>
        <p style={{fontSize:12,color:T.mid,margin:0}}>February 2026 cohort · IS 4011:2018</p>
      </div>
      <Btn label="+ New Study" onClick={()=>setNav({view:"new",id:null})}/>
    </div>
    <InlineBanner sev="critical" icon="🚨" title="CL-191 below minimum enrolment" body="18 enrolled vs 24 required. Screening window closes in 9 days — accelerate recruitment or risk study invalidation."/>
    <InlineBanner sev="info" icon="🏁" title="CL-183 & CL-187 ready for closure" body="Both studies completed. All Draize scores entered and PAFs prepared. Awaiting final sponsor sign-off only."/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
      {[["Completed",completed,T.teal],["Active",active,T.blue],["Screening",screening,T.amber]].map(([label,n,color])=>(
        <div key={label} style={{background:T.s1,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:11,color:T.mid,fontWeight:500,marginBottom:4}}>{label}</div><div style={{fontSize:26,fontWeight:800,color,fontFamily:"Georgia,serif"}}>{n}</div></div>
          <div style={{width:8,height:8,borderRadius:"50%",background:color,boxShadow:label==="Active"?`0 0 8px ${color}`:"none"}}/>
        </div>
      ))}
    </div>
    <Panel>
      <PHead title="All Studies" sub={`${studies.length} studies in this cohort`} accent={T.teal}/>
      {studies.map(s=><StudyRow key={s.id} s={s} onOpen={()=>openDetail(s.id)}/>)}
    </Panel>
  </div>);
};

const ParticipantsPage=({studies,participants})=>{
  const[search,setSearch]=useState("");
  const[fitzFilter,setFitzFilter]=useState("ALL");
  const[consentFilter,setConsentFilter]=useState("ALL");
  const[selected,setSelected]=useState(null);

  // Deduplicate: one row per volunteer ID, collect all study enrollments
  const volunteers=VOLUNTEERS_DATA.map(v=>{
    const enrollments=participants.filter(p=>p.id===v.id);
    const consent=v.consentDate?"Signed":"Pending";
    const anyFailed=enrollments.some(e=>e.screening==="Failed");
    const anyPassed=enrollments.some(e=>e.screening==="Passed");
    const screening=anyPassed?"Passed":anyFailed?"Failed":"—";
    return{...v,enrollments,consent,screening};
  });

  const filtered=volunteers.filter(v=>{
    if(fitzFilter!=="ALL"&&v.fitzpatrick!==fitzFilter) return false;
    if(consentFilter!=="ALL"&&v.consent!==consentFilter) return false;
    if(search){
      const q=search.toLowerCase();
      if(!v.id.toLowerCase().includes(q)&&!v.name.toLowerCase().includes(q)&&!v.city.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const total=volunteers.length;
  const consented=volunteers.filter(v=>v.consent==="Signed").length;
  const screened=volunteers.filter(v=>v.screening==="Passed").length;
  const multiStudy=volunteers.filter(v=>v.enrollments.length>1).length;
  const pendingConsent=volunteers.filter(v=>v.consent==="Pending").length;

  const getStudyLabel=id=>{const s=studies.find(x=>x.id===id);return s?`${s.id} — ${s.sponsor}`:id;};
  const getEnrollStatus=e=>e.status;

  // Detail panel for a selected volunteer
  if(selected){
    const v=volunteers.find(x=>x.id===selected);
    if(!v) return null;
    return(<div>
      <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:T.teal,fontSize:13,fontWeight:700,cursor:"pointer",padding:0,marginBottom:20}}>← Back to Volunteer Registry</button>
      <div style={{background:T.s1,border:`1px solid ${T.teal}33`,borderRadius:12,padding:"22px 26px",marginBottom:18,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${T.teal},${T.blue} 60%,transparent)`}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:`linear-gradient(135deg,${T.teal}44,${T.blue}44)`,border:`1.5px solid ${T.teal}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:T.teal,flexShrink:0}}>
                {v.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
              </div>
              <div>
                <div style={{fontSize:18,fontWeight:800,color:T.text,lineHeight:1}}>{v.name}</div>
                <div style={{fontFamily:T.mono,fontSize:11,color:T.teal,marginTop:3}}>{v.id}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Pill label={v.consent==="Signed"?"Consent Signed":"Consent Pending"} color={v.consent==="Signed"?T.teal:T.amber}/>
              <Pill label={`Fitzpatrick ${v.fitzpatrick}`} color={T.blue}/>
              <Pill label={`${v.enrollments.length} study enrollment${v.enrollments.length!==1?"s":""}`} color={T.indig}/>
              {v.enrollments.length>1&&<Pill label="Multi-study volunteer" color={T.amber}/>}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,minWidth:320}}>
            {[["Age / Gender",`${v.age} · ${v.gender==="F"?"Female":"Male"}`],["City",v.city],["Blood Group",v.bloodGroup],["Phone",v.phone],["Consent Date",v.consentDate||"—"],["Known Allergies",v.allergies]].map(([k,val])=>(
              <div key={k} style={{background:T.s2,borderRadius:7,padding:"10px 12px"}}>
                <div style={{fontSize:9,fontWeight:700,color:T.dim,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>{k}</div>
                <div style={{fontSize:12,fontWeight:600,color:v.allergies===val&&val!=="None known"?T.amber:T.text}}>{val}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <Panel>
        <PHead title="Study Enrollments" sub={`${v.enrollments.length} enrollment${v.enrollments.length!==1?"s":""} · visit data managed within each study`} accent={T.blue}/>
        {v.enrollments.length===0
          ?<div style={{padding:"28px",textAlign:"center",color:T.mid,fontSize:13}}>Not enrolled in any studies yet.</div>
          :v.enrollments.map((e,i)=>{
            const study=studies.find(s=>s.id===e.study)||{};

            return(<div key={i} style={{padding:"14px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>

                    <div key={lbl} style={{display:"flex",alignItems:"center",gap:4}}>
                      <div title={`${lbl}: ${tip}`} style={{width:22,height:22,borderRadius:"50%",fontSize:7,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",background:done?`${T.teal}28`:T.s4,border:`1.5px solid ${done?T.teal:T.dim}`,color:done?T.teal:T.dim}}>{done?"✓":"·"}</div>
                      <span style={{fontSize:9,color:done?T.teal:T.dim}}>{lbl}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:11,color:T.mid,marginBottom:4}}>{visitsDone}/4 visits complete</div>
                <div style={{width:80,height:4,background:T.s4,borderRadius:2,overflow:"hidden",marginLeft:"auto"}}>
                  <div style={{height:4,width:`${(visitsDone/4)*100}%`,background:visitsDone===4?T.teal:T.blue,borderRadius:2}}/>

              </div>
            </div>);

        ℹ Visit-level data (patch application, removal, Draize scoring) is managed within each Study's Participants tab, where it is linked to the specific product and protocol of that study.
      </div>
    </div>);
  }

        <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 4px"}}>Volunteer Registry</h2>
        <p style={{fontSize:12,color:T.mid,margin:0}}>Master list of all volunteers · demographics, consent, and study enrollments</p>
      </div>
      <Btn label="+ Register Volunteer" onClick={()=>{}}/>
    </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <span style={{fontSize:10,color:T.mid,fontWeight:500}}>{label}</span>
            <span style={{fontSize:14,opacity:0.7}}>{icon}</span>

          <div style={{fontSize:26,fontWeight:800,color,fontFamily:"Georgia,serif",lineHeight:1}}>{n}</div>
        </div>

    {/* Filters */}
    <Panel style={{marginBottom:16}}>
      <PHead title="Filter & Search" accent={T.blue}/>

        <div style={{minWidth:200}}>
          <div style={{fontSize:10,fontWeight:600,color:T.mid,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.5px"}}>Search name or ID</div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="e.g. V-005 or Ananya" style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:7,padding:"8px 12px",fontSize:12,color:T.text,outline:"none",width:"100%",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border}/>

        <div style={{marginLeft:"auto",alignSelf:"flex-end",fontSize:11,color:T.dim}}>{filtered.length} of {total} volunteers</div>

  const c={critical:T.rose,warning:T.amber,info:T.teal}[sev];
  const bg={critical:`${T.rose}0a`,warning:`${T.amber}08`,info:`${T.teal}07`}[sev];
  return(
    <div style={{background:bg,border:`1px solid ${c}33`,borderLeft:`4px solid ${c}`,borderRadius:8,padding:"12px 14px",marginBottom:14,display:"flex",gap:10,alignItems:"flex-start"}}>

};

        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${T.teal},${T.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:T.bg}}>⬡</div>
          <div><div style={{fontSize:14,fontWeight:800,color:T.text,lineHeight:1}}>ClinTrack</div><div style={{fontSize:9,color:T.mid,marginTop:2,letterSpacing:"0.5px"}}>CLINICAL OS</div></div>
        </div>
      </div>
      <nav style={{flex:1,padding:"10px 8px",overflowY:"auto"}}>
        {[["main","CORE"],["ops","OPERATIONS"],["compliance","COMPLIANCE"]].map(([grp,grpLabel])=>(
          <div key={grp} style={{marginBottom:6}}>
            <div style={{fontSize:9,fontWeight:700,color:T.dim,letterSpacing:"1px",padding:"10px 10px 5px"}}>{grpLabel}</div>
            {NAV.filter(n=>n.group===grp).map(item=>{
              const active=page===item.id;
              const built=builtPages.includes(item.id);
              const isCriticalAlert=item.id==="alerts";
              const critBadge=ALERTS.filter(a=>a.sev==="critical").length;
              return(<button key={item.id} onClick={()=>setPage(item.id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 10px",borderRadius:8,border:"none",cursor:"pointer",marginBottom:1,textAlign:"left",background:active?T.tealG:"transparent",color:active?T.teal:T.mid,fontWeight:active?700:400,fontSize:13,borderLeft:active?`2px solid ${T.teal}`:"2px solid transparent",transition:"all 0.15s"}} onMouseEnter={e=>{if(!active){e.currentTarget.style.background=T.s2;e.currentTarget.style.color=T.text;}}} onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.color=T.mid;}}}>
                <span style={{width:20,textAlign:"center",fontSize:14,flexShrink:0}}>{item.icon}</span>
                <span style={{flex:1}}>{item.label}</span>
                {isCriticalAlert&&critBadge>0&&<span style={{fontSize:9,fontWeight:800,color:"#fff",background:T.rose,borderRadius:10,padding:"1px 6px",minWidth:16,textAlign:"center",boxShadow:`0 0 6px ${T.rose}88`}}>{critBadge}</span>}
                {!isCriticalAlert&&!built&&!active&&<span style={{fontSize:8,fontWeight:700,color:T.dim,background:T.s3,borderRadius:3,padding:"1px 5px"}}>SOON</span>}
              </button>);
            })}
          </div>
        ))}
      </nav>
      <div style={{padding:"12px 16px",borderTop:`1px solid ${T.border}`,borderBottom:`1px solid ${T.border}`}}>
        <div style={{fontSize:9,fontWeight:700,color:T.dim,letterSpacing:"1px",marginBottom:8}}>SYSTEM STATUS</div>
        {[[T.teal,"All systems operational"],[T.rose,"2 critical alerts active"],[T.amber,"PAF deadline: 13 days"]].map(([c,label])=>(
          <div key={label} style={{display:"flex",gap:6,alignItems:"center",marginBottom:5}}><div style={{width:5,height:5,borderRadius:"50%",background:c,flexShrink:0,boxShadow:`0 0 4px ${c}`}}/><span style={{fontSize:10,color:c,fontWeight:600}}>{label}</span></div>
        ))}
      </div>
      <div style={{padding:"13px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:`linear-gradient(135deg,${T.teal}88,${T.blue}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:T.bg,flexShrink:0}}>PS</div>
          <div><div style={{fontSize:12,color:T.text,fontWeight:600,lineHeight:1}}>Priya Singh</div><div style={{fontSize:10,color:T.mid,marginTop:2}}>Study Coordinator</div></div>
        </div>
      </div>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{background:T.s0,borderBottom:`1px solid ${T.border}`,padding:"11px 26px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{fontSize:13,color:T.mid}}><span style={{color:T.dim}}>ClinTrack</span><span style={{color:T.dim}}> › </span><span style={{color:T.text,fontWeight:600}}>{current?.label}</span></div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}><span style={{fontFamily:T.mono,fontSize:10,color:T.dim}}>IS 4011:2018</span><span style={{fontSize:10,color:T.mid}}>C.L.A.I.M.S. Pvt. Ltd.</span><div style={{width:6,height:6,borderRadius:"50%",background:T.teal,boxShadow:`0 0 7px ${T.teal}`}}/><span style={{fontSize:11,color:T.teal,fontWeight:700}}>Live</span></div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"26px 30px"}}>
        {page==="dashboard"&&<DashboardPage onNav={setPage}/>}
        {page==="studies"&&<StudiesPage studies={studies} setStudies={setStudies} participants={participants} onAddParticipant={handleAddParticipant} onUpdateParticipant={handleUpdateParticipant}/>}
        {page==="participants"&&<ParticipantsPage studies={studies} participants={participants}/>}
        {page==="coa"&&<COAPage/>}
        {page==="alerts"&&<AlertsPage onNav={setPage}/>}
        {page==="execution"&&<ExecutionPage/>}
        {page==="adverse"&&<AdverseEventsPage/>}
        {page==="accountability"&&<AccountabilityPage/>}
        {page==="audit"&&<AuditPage/>}
        {!builtPages.includes(page)&&<Placeholder item={current} onBack={setPage}/>}
      </div>
    </div>
  </div>);
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
